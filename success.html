<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Ödeme Başarılı</title>
</head>
<body style="background:#0b0f19;color:white;font-family:Arial;text-align:center;padding:50px;">
  <h1>✅ Ödeme Başarılı</h1>
  <h2>Oyun Key’in:</h2>
  <h3 id="key"></h3>
 
 <br><br>
<a href="/" style="color:white;background:#22c55e;padding:12px 25px;border-radius:10px;text-decoration:none;">
  Ana Sayfaya Dön
</a>

  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById("key").innerText = params.get("key") || "Key bulunamadı";
  </script>
</body>
</html>
